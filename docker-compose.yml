version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEXUS_ENV=development
    volumes:
      - .:/app
    command: uvicorn ui.ctf_dashboard.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
